<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#f8f8f8;
  font-family:"Noto Sans TC", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:520px;
  text-align:center;
}

#sceneImg{
  max-width:180px;
  margin:0 auto 20px;
  display:none;
  opacity:0;
  transition:opacity 1.2s ease;
}
#sceneImg.show{opacity:1;}

.paragraph{
  opacity:0.35;
  transition:opacity 0.6s ease, transform 0.4s ease;
  margin-bottom:12px;
}

.paragraph.active{
  opacity:1;
  transform:translateY(-2px);
}

button{
  margin-top:15px;
  padding:8px 16px;
  border:none;
  background:#ddd;
  cursor:pointer;
}

.choice{
  border:1px solid #ccc;
  border-radius:20px;
  padding:10px;
  margin-top:15px;
  cursor:pointer;
}
.choice:hover{background:#eee;}

</style>
</head>

<body>

<div class="container">

<img id="sceneImg">
<div id="text"></div>

<button id="nextBtn" style="display:none;">繼續</button>

<div id="choices"></div>

</div>

<script>

let visited = new Set();

const story = {

start:{
text:`我很難用一種「典型」的方式來描述自己的身分與認同。`,
choices:[
  {text:"早療經驗", next:"early"},
  {text:"族群交織", next:"ethnicity"},
  {text:"教育與階級", next:"class"},
  {text:"學科轉換", next:"discipline"},
  {text:"性取向", next:"gender"},
  {text:"日常身分", next:"life"}
]
},

early:{
img:["images/puzzle/all.png"],
steps:[
`在更早的階段，我其實處於被觀察與調整的位置。`,
  
`曾有一段時間，我接受過早期療育；
許多細微之處被留意、記錄，並在過程中持續修正與引導。`,
  
`這些經驗未必都留下清晰的記憶痕跡，
卻在無形之中形塑了我理解自身的方式。`
],
choices:[{text:"回到開始", next:"start"}]
},

ethnicity:{
img:["images/identity/city.png","images/identity/culture.png"],
steps:[
`我在城市長大，生活方式與多數人沒有太大差別。`,

`但當身分被提起時，另一種理解方式也同時出現。`,

`這並非交替出現的兩種狀態，而是始終並行、彼此交織的存在。`
],
choices:[{text:"回到開始", next:"start"}]
},

class:{
img:[
"images/school/vocational.png",
"images/school/elite.png",
"images/ntuk.png"
],
steps:[
`家裡曾有一段時間屬於低收入戶。
很多選擇不是興趣導向，而是成本導向。`,

`從社區高職到明星高中，我第一次明顯感受到文化差異。
原來校園也是一種階級的縮影。`,

`後來，我進入臺灣大學。
這個轉變不僅涉及教育階段的提升，
更影響了他人對我的評價與定位－
我被重新放置到另一種社會座標之中。`
],
choices:[{text:"回到開始", next:"start"}]
},

discipline:{
steps:[
`我起初走在農藝的路上，後來轉向歷史。`,
`在兩種學科之間，我逐漸意識到：`,
`不同的知識體系，其實映照著不同的世界觀。`
],
choices:[{text:"回到開始", next:"start"}]
},

gender:{
steps:[
`我認同自己為雙性戀。`,
`而在多數情境中，`,
`我習慣先理解周遭，再選擇是否開口。`
],
choices:[{text:"回到開始", next:"start"}]
},

life:{
img:["images/life/study.png","images/life/work.png"],
steps:[
`我穿梭於課堂與辦公室之間。`,
`那並非兩條平行的軌道，`,
`而是相互交纏的生活紋理。`
],
choices:[{text:"回到開始", next:"start"}]
},

final:{
steps:[
`回頭看，我處在各種位置之間。`,
`它們不一定衝突，
只是會在不同時刻浮現。`,
`我不是單一的樣子，
而是在其間，逐漸成為自己。`
],
choices:[
  {text:"重新開始", next:"start"}
]
}

};

function typeWriter(el, text){

  el.innerText="";
  let i=0;

  function typing(){
    if(i>=text.length) return;

    el.innerText += text[i];

    let delay = 40;
    if(text[i]==="\n") delay = 200;
    if(text[i]==="。" || text[i]==="，") delay = 120;

    i++;
    setTimeout(typing, delay);
  }

  typing();
}

let stepIndex = 0;

function renderProgressive(scene){

visited.add(scene);

const textBox=document.getElementById("text");
const btn=document.getElementById("nextBtn");
const img=document.getElementById("sceneImg");
const choices=document.getElementById("choices");

const data=story[scene];

stepIndex=0;
textBox.innerHTML="";
choices.innerHTML="";

if(data.img){
  img.src=data.img[0];
  img.style.display="block";
  setTimeout(()=>img.classList.add("show"),200);
}else{
  img.style.display="none";
}

btn.style.display="inline-block";

function showNext(){

  if(stepIndex>=data.steps.length){

    btn.style.display="none";

    data.choices.forEach(c=>{
      const div=document.createElement("div");
      div.className="choice";
      div.innerText=c.text;
      div.onclick=()=>render(c.next);
      choices.appendChild(div);
    });

    return;
  }

  document.querySelectorAll(".paragraph").forEach(el=>{
    el.classList.remove("active");
  });

  const p=document.createElement("div");
  p.className="paragraph active";
  textBox.appendChild(p);

  typeWriter(p, data.steps[stepIndex]);

  if(data.img && data.img[stepIndex]){
    img.classList.remove("show");
    img.src=data.img[stepIndex];
    setTimeout(()=>img.classList.add("show"),100);
  }

  stepIndex++;
}

btn.onclick=showNext;
showNext();

}

function render(scene){

if(scene==="start"){

const textBox=document.getElementById("text");
const choices=document.getElementById("choices");
const img=document.getElementById("sceneImg");
const btn=document.getElementById("nextBtn");

img.style.display="none";
btn.style.display="none";

textBox.innerHTML=`<div class="paragraph active">${story.start.text}</div>`;
choices.innerHTML="";

story.start.choices.forEach(c=>{
const div=document.createElement("div");
div.className="choice";
div.innerText=c.text;
div.onclick=()=>renderProgressive(c.next);
choices.appendChild(div);
});

if(
  visited.has("early") &&
  visited.has("ethnicity") &&
  visited.has("class") &&
  visited.has("discipline") &&
  visited.has("gender") &&
  visited.has("life")
){
  const div=document.createElement("div");
  div.className="choice";
  div.innerText="查看整體";
  div.onclick=()=>renderProgressive("final");
  choices.appendChild(div);
}

return;
}

renderProgressive(scene);

}

render("start");

</script>

</body>
</html>

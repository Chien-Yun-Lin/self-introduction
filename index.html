<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#f8f8f8;
  font-family:"Noto Sans TC", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:520px;
  text-align:center;
}

#sceneImg{
  max-width:180px;
  width:100%;
  margin:0 auto 20px auto;
  display:none;
  opacity:0;
  transition:opacity 1.8s ease;
}
#sceneImg.show{opacity:1;}

#text{
  line-height:1.9;
  margin-bottom:30px;
  white-space:pre-line;
}
  
#text::after{
  content:"|";
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

.choice{
  border:1px solid #ccc;
  border-radius:20px;
  padding:10px;
  margin:8px 0;
  cursor:pointer;
}
.choice:hover{background:#eee;}

</style>
</head>

<body>

<div class="container">
  <img id="sceneImg">
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script>

let visited = new Set();

const story = {

start:{
text:`我很難用一種「典型」的方式來描述自己的身分與認同。`,
img:null,
choices:[
  {text:"從更早開始", next:"early"},
  {text:"族群", next:"ethnicity"},
  {text:"教育與階級", next:"class"},
  {text:"學科與知識", next:"discipline"},
  {text:"性別與情感", next:"gender"},
  {text:"日常生活", next:"life"}
]
},

early:{
text:`在更早之前，我其實是被觀察與修正的對象。

有一段時間，我接受早期療育。
很多細節被注意、被記錄，也被調整。

那些過程不一定留下明確記憶，
但影響了我理解自己的方式。`,
img:"images/puzzle/all.png",
choices:[{text:"回到開始", next:"start"}]
},

ethnicity:{
text:`我是原住民，但沒有在部落成長。
生活方式也以都市漢人文化為主。

這樣的距離感，讓我開始思考自己的位置。`,
img:"images/identity/city.png",
choices:[
  {text:"他人如何看我？", next:"ethnicity2"},
  {text:"回到開始", next:"start"}
]
},

ethnicity2:{
text:`在多數情境中，我被視為主流的一部分。

但當身分被知道時，
會出現一些預設與想像。

族群不只是生活方式，
也是一種社會分類。`,
img:"images/identity/culture.png",
choices:[{text:"回到開始", next:"start"}]
},

class:{
text:`家裡曾有一段時間屬於低收入戶。

很多選擇不是興趣導向，
而是成本導向。`,
img:"images/school/vocational.png",
choices:[
  {text:"教育經驗", next:"class2"},
  {text:"回到開始", next:"start"}
]
},

class2:{
text:`從內湖高工到中山女高，
我第一次明顯感受到文化差異。

原來校園也是一種階級文化的縮影。`,
img:"images/school/elite.png",
choices:[
  {text:"進入台大", next:"ntu"},
  {text:"回到開始", next:"start"}
]
},

ntu:{
text:`後來，我成為家族第一個臺大生。

這不只是學校的改變，
也包含他人看待我的方式。

有些期待，變得理所當然。`,
img:"images/ntuk.png",
choices:[{text:"回到開始", next:"start"}]
},

discipline:{
text:`我曾在農藝系學習。

那裡重視技術與效率。`,
img:"images/life/study.png",
choices:[
  {text:"轉入歷史系", next:"discipline2"},
  {text:"回到開始", next:"start"}
]
},

discipline2:{
text:`後來轉入歷史系。

我開始更關心土地背後的歷史與人。

不同學科，其實代表不同世界觀。`,
img:"images/life/work.png",
choices:[{text:"回到開始", next:"start"}]
},

gender:{
text:`在性別與情感認同上，我是雙性戀。

異性戀常被視為默認。`,
img:null,
choices:[
  {text:"如何影響我？", next:"gender2"},
  {text:"回到開始", next:"start"}
]
},

gender2:{
text:`很多時候，我會先觀察環境，
再決定是否表達自己。

文化透過細微方式提醒誰是多數。`,
img:null,
choices:[{text:"回到開始", next:"start"}]
},

life:{
text:`我的生活不只一種樣貌。

有些時間，我在課堂裡。
有些時間，我在辦公室。

這兩種狀態交錯在日常裡。`,
img:"images/life/study.png",
choices:[
  {text:"另一種狀態", next:"life2"},
  {text:"回到開始", next:"start"}
]
},

life2:{
text:`在不同節奏之間切換，
沒有明確界線。

只是持續發生。`,
img:"images/life/work.png",
choices:[{text:"回到開始", next:"start"}]
},

final:{
text:`回頭看，我處在多重位置之間。

這些經驗不一定衝突，
但會在不同情境中浮現。

我不是單一的樣子，
而是在這些之間，逐漸成為。`,
img:null,
choices:[
  {text:"重新開始", next:"start"}
]
}

};

function typeText(el, text, callback){

  el.innerText="";
  let i=0;

  function typing(){
    if(i >= text.length){
      if(callback) callback();
      return;
    }

    el.innerText += text[i];

    let char = text[i];
    let delay = 45;

    if(i < 10) delay = 80;
    if(char === "\n") delay = 300;
    if(char === "。" || char === "，") delay = 120;

    i++;
    setTimeout(typing, delay);
  }

  typing();
}

function render(scene){

visited.add(scene);

const textBox=document.getElementById("text");
const choiceBox=document.getElementById("choices");
const img=document.getElementById("sceneImg");

choiceBox.innerHTML="";

if(story[scene].img){
  img.classList.remove("show");
  img.src=story[scene].img;
  img.style.display="block";
  setTimeout(()=>img.classList.add("show"),250);
}else{
  img.style.display="none";
}

typeText(textBox, story[scene].text, ()=>{

  story[scene].choices.forEach(c=>{
    const btn=document.createElement("div");
    btn.className="choice";
    btn.innerText=c.text;
    btn.onclick=()=>render(c.next);
    choiceBox.appendChild(btn);
  });

  if(
    visited.has("early") &&
    visited.has("ethnicity2") &&
    visited.has("class2") &&
    visited.has("ntu") &&
    visited.has("discipline2") &&
    visited.has("gender2") &&
    visited.has("life2") &&
    scene === "start"
  ){
    const btn=document.createElement("div");
    btn.className="choice";
    btn.innerText="查看整體";
    btn.onclick=()=>render("final");
    choiceBox.appendChild(btn);
  }

});

}

render("start");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  background:#f8f8f8;
  color:#333;
  scroll-behavior:smooth;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.7);
  text-align:center;
  padding:10px;
  z-index:1000;
}

/* ===== 拼圖 ===== */
.puzzle-area{
  position:relative;
  width:260px;
  height:260px;
}
.piece{
  position:absolute;
  width:120px;
  cursor:grab;
}
.piece.done{cursor:default;}

/* ===== slider 共用 ===== */
.slider, .slider-vertical{
  position:relative;
  width:260px;
}

.top{
  width:100%;
}

#overlay{
  position:absolute;
  top:0;
  left:0;
  width:0%;
  height:100%;
  overflow:hidden;
}

#overlayV{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:0%;
  overflow:hidden;
}

/* ===== 滑桿統一 ===== */
input[type=range]{
  -webkit-appearance:none;
  background:transparent;
}

#range{width:260px;}
#rangeV{
  writing-mode: bt-lr;
  height:200px;
}

input[type=range]::-webkit-slider-runnable-track{
  height:4px;
  background:#ccc;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;
  height:14px;
  background:#333;
  border-radius:50%;
  margin-top:-5px;
}

/* ===== 夢境 ===== */
.dream{
  animation:dream 2s infinite alternate;
}
@keyframes dream{
  0%{filter:blur(0);}
  100%{filter:blur(3px);opacity:0.7;}
}

/* ===== 第五章 ===== */
.transition-box{
  position:relative;
  width:260px;
}
.transition-box img{
  position:absolute;
  width:100%;
  transition:opacity 1.2s;
}
#img1{opacity:1;}
#img2{opacity:0;}

/* ===== 最終 ===== */
.identity{
  position:absolute;
  width:120px;
}

</style>
</head>

<body>

<!-- 第一章 -->
<section id="p1">
<div class="puzzle-area">

<img src="images/puzzle/p1.png" class="piece" data-x="0" data-y="0" data-text="有些改變很細微。">
<img src="images/puzzle/p2.png" class="piece" data-x="140" data-y="0" data-text="很多事情，是慢慢學會的。">
<img src="images/puzzle/p3.png" class="piece" data-x="0" data-y="140" data-text="那些過程，也成為一部分。">
<img src="images/puzzle/p4.png" class="piece" data-x="140" data-y="140" data-text="她一直在我旁邊。">

</div>

<p id="puzzleText"></p>
</section>

<!-- 第二章 -->
<section id="p2">
<div class="slider">
<img src="images/identity/city.png" class="top">
<div id="overlay">
<img src="images/identity/culture.png">
</div>
<input type="range" id="range" value="0">
</div>
<p id="text2">我從小在城市長大。</p>
</section>

<!-- 第三章 -->
<section id="p3">
<div class="slider-vertical">
<img src="images/school/vocational.png" class="top">
<div id="overlayV">
<img src="images/school/elite.png">
</div>
<input type="range" id="rangeV" value="0">
</div>
<p id="text3">我原本的起點，在這裡。</p>
</section>

<!-- 第四章 -->
<section id="p4">
<img src="images/ntuk.png" class="dream">
<p>有些期待，慢慢出現。</p>
</section>

<!-- 第五章 -->
<section id="p5">
<div class="transition-box">
<img src="images/life/study.png" id="img1">
<img src="images/life/work.png" id="img2">
</div>
<p id="text5">白天，我是學生。</p>
</section>

<!-- 最終 -->
<section id="end">
<div style="position:relative;width:300px;height:300px;">
<img src="images/identity/city.png" class="identity" style="top:0;left:0">
<img src="images/identity/culture.png" class="identity" style="top:0;right:0">
<img src="images/school/vocational.png" class="identity" style="bottom:0;left:0">
<img src="images/school/elite.png" class="identity" style="bottom:0;right:0">
<img src="images/life/study.png" class="identity" style="top:50%;left:0">
<img src="images/life/work.png" class="identity" style="top:50%;right:0">
</div>
<p>這些樣子，都同時存在。</p>
</section>

<script>

/* ===== 拼圖 ===== */
const pieces=document.querySelectorAll(".piece");
const textBox=document.getElementById("puzzleText");
let correct=0;

pieces.forEach(p=>{
p.onmousedown=function(e){

if(p.classList.contains("done")) return;

let shiftX=e.clientX-p.offsetLeft;
let shiftY=e.clientY-p.offsetTop;

function move(e){
p.style.left=e.pageX-shiftX+"px";
p.style.top=e.pageY-shiftY+"px";
}

function stop(){
document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",stop);

let x=parseInt(p.dataset.x);
let y=parseInt(p.dataset.y);

if(Math.abs(p.offsetLeft-x)<30 && Math.abs(p.offsetTop-y)<30){

p.style.left=x+"px";
p.style.top=y+"px";
p.classList.add("done");

textBox.innerText=p.dataset.text;

correct++;

if(correct===4){
setTimeout(()=>{
document.getElementById("p2").scrollIntoView({behavior:"smooth"});
},800);
}
}
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",stop);
}
});

/* ===== 統一滑動系統（阻尼） ===== */
function smoothReveal(range, overlay, textBox, direction){

let current=0;

function animate(){
let target=range.value;
current += (target-current)*0.1;

if(direction==="x"){
overlay.style.width=current+"%";
}else{
overlay.style.height=current+"%";
}

if(current<30){
textBox.innerText="起點。";
}else if(current<70){
textBox.innerText="開始變化。";
}else{
textBox.innerText="逐漸成為另一種樣子。";
}

requestAnimationFrame(animate);
}

animate();
}

smoothReveal(
document.getElementById("range"),
document.getElementById("overlay"),
document.getElementById("text2"),
"x"
);

smoothReveal(
document.getElementById("rangeV"),
document.getElementById("overlayV"),
document.getElementById("text3"),
"y"
);

/* ===== 第五章轉場 ===== */
const img1=document.getElementById("img1");
const img2=document.getElementById("img2");
const text5=document.getElementById("text5");

let state=0;

setInterval(()=>{
if(state===0){
img1.style.opacity=0;
img2.style.opacity=1;
text5.innerText="有些時候，我也是工讀生。";
state=1;
}else{
img1.style.opacity=1;
img2.style.opacity=0;
text5.innerText="白天，我是學生。";
state=0;
}
},2500);

/* ===== 最終 ===== */
const ids=document.querySelectorAll(".identity");
setInterval(()=>{
const i=Math.floor(Math.random()*ids.length);
ids[i].style.transform=`scale(${0.9+Math.random()*0.3})`;
},800);

</script>

</body>
</html>

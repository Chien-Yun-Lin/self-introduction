<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#f8f8f8;
  font-family:"Noto Sans TC", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:520px;
  text-align:center;
}

#sceneImg{
  max-width:180px;
  width:100%;
  margin:0 auto 20px auto;
  display:none;
  opacity:0;
  transition:opacity 1.8s ease;
}
#sceneImg.show{opacity:1;}

#text{
  line-height:1.9;
  margin-bottom:30px;
  white-space:pre-line;
}

#text::after{
  content:"|";
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

.choice{
  border:1px solid #ccc;
  border-radius:20px;
  padding:10px;
  margin:8px auto;
  width:80%;
  cursor:pointer;
}
.choice:hover{background:#eee;}

</style>
</head>

<body>

<div class="container">
  <img id="sceneImg">
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script>

let visited = new Set();

const story = {

start:{
text:`我很難用一種「典型」的方式來描述自己的身分與認同。`,
img:null,
choices:[
  {text:"從更早開始", next:"early"},
  {text:"族群", next:"ethnicity"},
  {text:"教育與階級", next:"class"},
  {text:"學科與知識", next:"discipline"},
  {text:"性別與情感", next:"gender"},
  {text:"日常生活", next:"life"}
]
},

early:{
text:`在更早之前，我其實是被觀察與修正的對象。

有一段時間，我接受早期療育。
很多細節被注意、被記錄，也被調整。

那些過程影響了我理解自己的方式。`,
img:"images/puzzle/all.png",
choices:[{text:"回到開始", next:"start"}]
},

ethnicity:{
text:`我是原住民，但沒有在部落成長。
生活方式以都市文化為主。

這樣的距離感，讓我開始思考自己的位置。`,
img:"images/identity/city.png",
choices:[{text:"回到開始", next:"start"}]
},

class:{
text:`家裡曾有一段時間屬於低收入戶。

很多選擇不是興趣導向，
而是成本導向。`,
img:"images/school/vocational.png",
choices:[{text:"進入台大", next:"ntu"}]
},

ntu:{
text:`後來，我進入台灣大學。

這不只是學校的改變，
也包含他人看待我的方式。`,
img:"images/ntuk.png",
choices:[{text:"回到開始", next:"start"}]
},

discipline:{
text:`我曾在農藝系，
後來轉入歷史系。

不同學科代表不同世界觀。`,
img:"images/life/study.png",
choices:[{text:"回到開始", next:"start"}]
},

gender:{
text:`在性別認同上，我是雙性戀。

很多時候，我會先觀察環境，
再決定是否表達。`,
img:null,
choices:[{text:"回到開始", next:"start"}]
},

life:{
text:`我的生活不只是一種樣子。

有時在課堂，
有時在工作。`,
img:"images/life/work.png",
choices:[{text:"回到開始", next:"start"}]
},

final:{
text:`回頭看，我處在多重交會之中。

這些不是衝突，
而是持續的調整。

我仍在理解，自己如何成為現在的樣子。`,
img:null,
choices:[{text:"重新開始", next:"start"}]
}

};

function typeText(el, text, callback){

  el.innerText="";
  let i=0;

  function typing(){

    if(i >= text.length){
      if(callback) callback();
      return;
    }

    el.innerText += text[i];

    let char = text[i];
    let delay = 45;

    if(i < 10) delay = 80;
    if(char === "\n") delay = 300;
    if(char === "。" || char === "，") delay = 120;

    i++;
    setTimeout(typing, delay);
  }

  typing();
}

function render(scene){

const textBox=document.getElementById("text");
const choiceBox=document.getElementById("choices");
const img=document.getElementById("sceneImg");

choiceBox.innerHTML="";

if(scene !== "start" && scene !== "final"){
  visited.add(scene);
}

if(story[scene].img){
  img.classList.remove("show");
  img.src=story[scene].img;
  img.style.display="block";
  setTimeout(()=>img.classList.add("show"),250);
}else{
  img.style.display="none";
}

typeText(textBox, story[scene].text, ()=>{

  story[scene].choices.forEach(c=>{
    const btn=document.createElement("div");
    btn.className="choice";
    btn.innerText=c.text;
    btn.onclick=()=>render(c.next);
    choiceBox.appendChild(btn);
  });

  if(scene === "start" && visited.size >= 6){
    const btn=document.createElement("div");
    btn.className="choice";
    btn.innerText="前往最終";
    btn.onclick=()=>render("final");
    choiceBox.appendChild(btn);
  }

});

}

render("start");

</script>

</body>
</html>

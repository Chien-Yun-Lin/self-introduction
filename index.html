<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:"Noto Sans TC", sans-serif;
  background:#f8f8f8;
  color:#333;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(255,255,255,0.7);
  text-align:center;
  padding:10px;
  z-index:1000;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:#333;
}

.puzzle-area{
  position:relative;
  width:260px;
  height:260px;
}
.piece{
  position:absolute;
  width:120px;
  cursor:grab;
  transition:0.3s;
}
.piece:hover{transform:scale(1.05);}

.slider{
  position:relative;
  width:260px;
}

.base{
  width:100%;
  display:block;
}

#overlay{
  position:absolute;
  top:0;
  left:0;
  width:0%;
  height:100%;
  overflow:hidden;
}

#overlay img{
  width:100%;
  display:block;
}

.handle{
  position:absolute;
  top:0;
  width:3px;
  height:100%;
  background:#333;
  left:0%;
  cursor:ew-resize;
}

.fade{
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

.dream{
  animation:dream 2s infinite alternate;
}
@keyframes dream{
  0%{filter:blur(0);}
  100%{filter:blur(3px);opacity:0.7;}
}

.dual{position:relative;}
.dual img{
  position:absolute;
  width:200px;
  animation:breathe 3s infinite alternate;
}
@keyframes breathe{
  0%{opacity:0.6;}
  100%{opacity:1;}
}

.identity{
  position:absolute;
  width:120px;
  transition:0.5s;
}

</style>
</head>

<body>

<nav>
<a href="#p1">拼圖</a>
<a href="#p2">身分</a>
<a href="#p3">轉換</a>
<a href="#p4">台大</a>
<a href="#p5">生活</a>
<a href="#end">最後</a>
</nav>

<section id="p1">
<div class="puzzle-area">
<img src="images/puzzle/p1.png" class="piece" data-x="0" data-y="0">
<img src="images/puzzle/p2.png" class="piece" data-x="140" data-y="0">
<img src="images/puzzle/p3.png" class="piece" data-x="0" data-y="140">
<img src="images/puzzle/p4.png" class="piece" data-x="140" data-y="140">
</div>
<p id="puzzleText"></p>
</section>

<section id="p2">
<div class="slider" id="slider">

<img src="images/identity/city.png" class="base">

<div id="overlay">
<img src="images/identity/culture.png">
</div>

<div class="handle" id="handle"></div>

</div>

<p id="text2">我從小在城市長大。</p>
</section>

<section id="p3">
<img src="images/school/vocational.png" class="fade">
<img src="images/school/elite.png" class="fade">
<p class="fade">不同環境，也帶來不同的標準。</p>
</section>

<section id="p4">
<img src="images/ntuk.png" class="dream">
<p>有些期待，慢慢出現。</p>
</section>

<!-- 第五章 -->
<section id="p5">
<div class="dual">
<img src="images/life/study.png">
<img src="images/life/work.png" style="transform:translate(10px,10px);">
</div>
<p>學生與工讀，同時存在。</p>
</section>

<!-- 最終 -->
<section id="end">
<div style="position:relative;width:300px;height:300px;">
<img src="images/identity/city.png" class="identity" style="top:0;left:0">
<img src="images/identity/culture.png" class="identity" style="top:0;right:0">
<img src="images/school/vocational.png" class="identity" style="bottom:0;left:0">
<img src="images/school/elite.png" class="identity" style="bottom:0;right:0">
<img src="images/life/study.png" class="identity" style="top:50%;left:0">
<img src="images/life/work.png" class="identity" style="top:50%;right:0">
</div>

<p>這些樣子，都同時存在。</p>
</section>

<script>

/* ===== 拼圖（修正版） ===== */
const pieces=document.querySelectorAll(".piece");
let correct=0;

pieces.forEach(p=>{
p.onmousedown=function(e){

if(p.classList.contains("done")) return;

let shiftX=e.clientX-p.offsetLeft;
let shiftY=e.clientY-p.offsetTop;

function move(e){
p.style.left=e.pageX-shiftX+"px";
p.style.top=e.pageY-shiftY+"px";
}

function stop(){
document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",stop);

let x=parseInt(p.dataset.x);
let y=parseInt(p.dataset.y);

if(Math.abs(p.offsetLeft-x)<30 && Math.abs(p.offsetTop-y)<30){
p.style.left=x+"px";
p.style.top=y+"px";
p.classList.add("done");
correct++;

if(correct===4){
setTimeout(()=>{
document.getElementById("p2").scrollIntoView({behavior:"smooth"});
},600);
}
}
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",stop);
}
});

const slider=document.getElementById("slider");
const overlay=document.getElementById("overlay");
const handle=document.getElementById("handle");
const text2=document.getElementById("text2");

function update(x){
let rect=slider.getBoundingClientRect();
let percent=(x-rect.left)/rect.width*100;

percent=Math.max(0,Math.min(100,percent));

overlay.style.width=percent+"%";
handle.style.left=percent+"%";

if(percent<30){
text2.innerText="我從小在城市長大。";
}else if(percent<70){
text2.innerText="但我的身分不只這樣。";
}else{
text2.innerText="有些文化一直在我身上。";
}
}

handle.onmousedown=function(e){
document.onmousemove=(e)=>update(e.clientX);
document.onmouseup=()=>document.onmousemove=null;
};

const fades=document.querySelectorAll(".fade");
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){e.target.classList.add("show");}
});
});
fades.forEach(el=>obs.observe(el));

const ids=document.querySelectorAll(".identity");
setInterval(()=>{
const i=Math.floor(Math.random()*ids.length);
ids[i].style.transform=`scale(${0.9+Math.random()*0.3})`;
},800);

</script>

</body>
</html>

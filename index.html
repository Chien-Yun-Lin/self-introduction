<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>在之間，成為</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f8f8f8;
  font-family:"Noto Sans TC", sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:520px;
}

#text{
  line-height:1.9;
  margin-bottom:30px;
  white-space:pre-line;
}

.choice{
  border:1px solid #ccc;
  border-radius:20px;
  padding:10px;
  margin:8px 0;
  text-align:center;
  cursor:pointer;
}

.choice:hover{
  background:#eee;
}
</style>
</head>

<body>

<div class="container">
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script>

const story = {

start:{
text:`我很難用一種「典型」的方式來描述自己的身分與認同。`,
choices:[
  {text:"族群", next:"ethnicity"},
  {text:"教育與階級", next:"class"},
  {text:"學科與知識", next:"discipline"},
  {text:"性別與情感", next:"gender"}
]
},

/* 族群 */
ethnicity:{
text:`我是原住民，但沒有在部落成長。\n生活方式也以都市漢人文化為主。\n\n這樣的距離感，讓我開始思考：\n當文化沒有明顯外在標誌時，我如何理解自己的位置？`,
choices:[
  {text:"他人如何看我？", next:"ethnicity2"},
  {text:"回到開始", next:"start"}
]
},

ethnicity2:{
text:`在多數情境中，我被視為主流的一部分。\n\n但當身分被知道時，\n會出現一些預設：\n升學加分、文化期待、家庭背景。\n\n族群不只是生活方式，\n也是一種社會分類。`,
choices:[
  {text:"回到整體", next:"start"}
]
},

/* 階級 */
class:{
text:`家裡曾有一段時間屬於低收入戶。\n\n很多選擇不是興趣導向，\n而是成本導向。`,
choices:[
  {text:"教育經驗", next:"class2"},
  {text:"回到開始", next:"start"}
]
},

class2:{
text:`從高職到中山女高，\n我第一次明顯感受到文化差異。\n\n對未來的想像、\n對成功的定義、\n對自信的培養方式，都不一樣。\n\n校園也是一種階級文化的縮影。`,
choices:[
  {text:"回到整體", next:"start"}
]
},

/* 學科 */
discipline:{
text:`我曾在農藝系學習。\n\n那裡重視技術、效率與改良。`,
choices:[
  {text:"為何轉系？", next:"discipline2"},
  {text:"回到開始", next:"start"}
]
},

discipline2:{
text:`後來我轉入歷史系。\n\n我開始更關心土地背後的歷史與人。\n\n不同學科，其實代表不同世界觀。`,
choices:[
  {text:"回到整體", next:"start"}
]
},

/* 性別 */
gender:{
text:`在性別與情感認同上，我是雙性戀。\n\n異性戀常被視為默認。`,
choices:[
  {text:"如何影響我？", next:"gender2"},
  {text:"回到開始", next:"start"}
]
},

gender2:{
text:`很多時候，我會先觀察環境，\n再決定是否表達自己。\n\n文化不一定排斥，\n但會透過語言與假設提醒誰是多數。`,
choices:[
  {text:"回到整體", next:"start"}
]
},

/* 結尾 */
end:{
text:`回頭看，我處在多重文化交會之中。\n\n這些不是劇烈衝突，\n而是日常中反覆出現的調整。\n\n認同不是宣告，\n而是一個持續理解的過程。`,
choices:[
  {text:"重新開始", next:"start"}
]
}

};

function render(scene){

const textBox=document.getElementById("text");
const choiceBox=document.getElementById("choices");

textBox.innerText=story[scene].text;
choiceBox.innerHTML="";

story[scene].choices.forEach(c=>{
const btn=document.createElement("div");
btn.className="choice";
btn.innerText=c.text;
btn.onclick=()=>render(c.next);
choiceBox.appendChild(btn);
});

}

render("start");

</script>

</body>
</html>
